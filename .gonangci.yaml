linters:
  enable:
    - errcheck      # непроверенные ошибки
    - govet         # встроенные проверки компилятора
    - staticcheck   # расширенный статический анализ
    - unused        # неиспользуемый код
    - ineffassign   # неэффективные присваивания
    - revive        # замена golint, гибкие правила
    - gosec         # безопасность (опционально)

run:
  timeout: 5m
  modules-download-mode: readonly
  skip-dirs:
    - vendor
    - third_party

output:
  format: colored-line-number

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec